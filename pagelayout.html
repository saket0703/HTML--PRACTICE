<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Layout</title>
</head>

<body>

<table border="1" width="100%" height="600">

    <!-- Header -->
    <tr height="10%">
        <td colspan="2" align="center"
            <h1><strong><u>Web Page Layout</u></strong></h1>
        </td>
    </tr>

    <!-- Navigation -->
    <tr height="10%">
        <td colspan="2" align="center">
            &lt;nav&gt;
        </td>
    </tr>

    <!-- Main Content -->
    <tr height="60%">
        <td width="75%" valign="top" align="center">

            &lt;section&gt;<br>

            <table border="1" width="100%">
                <tr>
                    <td align="center">Heading</td>
                </tr>

                <tr>
                    <td align="center">
                        &lt;article&gt;
                    </td>
                </tr>
            </table>

        </td>

        <td width="25%" align="center" valign="top">
            &lt;aside&gt;
        </td>
    </tr>

    <!-- Footer -->
    <tr height="20%">
        <td colspan="2" align="center">
            &lt;footer&gt;
        </td>
    </tr>

</table>

</body>
</html>
