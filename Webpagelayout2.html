<!DOCTYPE html>
<html style="height:100%;">
<head>
    <title>Chipi Technologies - Corrected Table Layout</title>
</head>

<body style="height:100%; margin:0;">

<table border="1" width="100%" height="100%">

    <!-- Header -->
    <tr height="10%">
        <td colspan="2" align="center">
            &lt;header&gt;
        </td>
    </tr>

    <!-- Navigation -->
    <tr height="10%">
        <td colspan="2" align="center">
            &lt;nav&gt;
        </td>
    </tr>

    <!-- Section + Aside -->
    <tr height="20%">
        <td width="70%" align="center" valign="top">
            &lt;section&gt;
        </td>

        <td width="30%" rowspan="2" align="center" valign="top">
            &lt;aside&gt;
        </td>
    </tr>

    <!-- Article -->
    <tr height="20%">
        <td align="center" valign="top">
            &lt;article&gt;
        </td>
    </tr>

    <!-- Footer -->
    <tr height="20%">
        <td colspan="2" align="center">
            &lt;footer&gt;
        </td>
    </tr>

</table>

</body>
</html>
