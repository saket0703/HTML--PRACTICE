<!DOCTYPE html>
<html>
<head>
    <title>Complex Table Layout</title>
</head>
<body>

<table border="1" width="100%" height="700">

    <!-- Header Row -->
    <tr height="15%">
        <td width="15%" rowspan="5" valign="top">
            Navigation
        </td>

        <td colspan="2" align="center">
            <b>Header</b>
        </td>
    </tr>

    <!-- Student Number Row -->
    <tr height="8%">
        <td width="65%">
            Student Number: 92837293
        </td>

        <td width="20%" align="center">
            All Students
        </td>
    </tr>

    <!-- Main Left Box + Top Right Box -->
    <tr height="35%">
        <td rowspan="2" valign="top" align="center">
            [Main Left Box]
        </td>

        <td align="center">
            [Top Right Box]
        </td>
    </tr>

    <!-- Bottom Right Box -->
    <tr height="35%">
        <td align="center">
            [Bottom Right Box]
        </td>
    </tr>

    <!-- Bottom Full Width Box -->
    <tr height="20%">
        <td colspan="2" align="center">
            [Bottom Full Width Box]
        </td>
    </tr>

</table>

</body>
</html>
